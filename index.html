<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ Angie</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body, html {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow-x: hidden;
  background: #000;
}

/* Navbar */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  height: 40px;
  background: rgba(7,1,1,0.65);
  backdrop-filter: blur(5px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 5;
  opacity: 0;
  transform: translateY(-50px);
  animation: slideDown 0.8s ease-out forwards;
}

.navbar a {
  color: white;
  text-decoration: none;
  margin: 0 20px;
}
.navbar a:hover {
  color: gold;
  text-shadow: 0 0 10px gold;
}

/* Hero */
.hero {
  position: relative;
  height: 100vh;
  background: linear-gradient(to right, #2a0000, #400000, #1a0000);
  overflow: hidden;
}

/* Angie Image */
.hero-img {
  position: absolute;
  left: 0;
  top: 61.1%;
  width: 45%;
  max-width: 600px;
  transform: translate3d(-120%, -50%, 0);
  opacity: 0;
  will-change: transform, opacity;
  backface-visibility: hidden;
  animation: slideImage 5s cubic-bezier(.25,.8,.25,1) forwards;
}

/* DJ Text */
.hero-text {
  position: absolute;
  top: 50%;
  left: 70%;
  transform: translate3d(-50%, -50%, 0);
  font-family: 'Great Vibes', cursive;
  font-size: 8rem;
  color: rgb(160, 141, 30);
  text-shadow: 0 0 20px rgb(184, 161, 34), 0 0 40px red;
  opacity: 0;
  will-change: transform, opacity;
  animation: fadeInText 4s ease-out forwards 2s,
             glowPulse 5s ease-in-out infinite alternate;
}

/* Make I container */
.mic-letter {
  position: relative;
  display: inline-block;
}

/* Emoji Mic */
.mic-emoji {
  position: absolute;
  top: -225px;  /* controls height above I */
  left: 50%;
  transform: translateX(-50%);
  font-size: 60px;
  animation: bounceMic 1.5s ease-in-out infinite;
  pointer-events: none;
}

/* Animations */
@keyframes slideImage {
  to {
    transform: translate3d(0, -50%, 0);
    opacity: 1;
  }
}

@keyframes fadeInText {
  to {
    opacity: 1;
  }
}

@keyframes slideDown {
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

@keyframes glowPulse {
  from {
    text-shadow: 0 0 20px gold, 0 0 40px red;
  }
  to {
    text-shadow: 0 0 35px gold, 0 0 60px red;
  }
}

/* Bouncing Animation */
@keyframes bounceMic {
  0%   { transform: translateX(-50%) translateY(0); }
  50%  { transform: translateX(-50%) translateY(-15px); }
  100% { transform: translateX(-50%) translateY(0); }
}

</style>
</head>
<body>

<div class="navbar">
  <a href="Home.html">Home</a>
  <a href="about.html">About</a>
  <a href="services.html">Services</a>
  <a href="bookings.html">Bookings</a>
</div>

<div class="hero">
  <img src="Angie1.jpg" class="hero-img" alt="DJ Angie">

  <div class="hero-text">
    DJ ANGi<span class="mic-letter">
      <span class="mic-emoji">🎤</span>
    </span>
  </div>

</div>

</body>
</html>
