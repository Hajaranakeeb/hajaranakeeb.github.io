<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ Angie</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body, html {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow-x: hidden;
  background: #000;
}

/* Navbar */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  height: 40px;
  background: rgba(7,1,1,0.65);
  backdrop-filter: blur(5px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 5;
  opacity: 0;
  transform: translateY(-50px);
  animation: slideDown 0.8s ease-out forwards;
}

.navbar a {
  color: white;
  text-decoration: none;
  margin: 0 20px;
}
.navbar a:hover {
  color: gold;
  text-shadow: 0 0 10px gold;
}

/* Hero */
.hero {
  position: relative;
  height: 100vh;
  background: linear-gradient(to right, #2a0000, #400000, #1a0000);
  overflow: hidden;
}

/* Angie Image */
.hero-img {
  position: absolute;
  left: 0;
  top: 61.1%;
  width: 45%;
  max-width: 600px;
  transform: translate3d(-120%, -50%, 0);
  opacity: 0;
  will-change: transform, opacity;
  backface-visibility: hidden;
  animation: slideImage 5s cubic-bezier(.25,.8,.25,1) forwards;
}

/* DJ Text */
.hero-text {
  position: absolute;
  top: 50%;
  left: 70%;
  transform: translate3d(-50%, -50%, 0);
  font-family: 'Great Vibes', cursive;
  font-size: 8rem;
  color: rgb(160, 141, 30);
  text-shadow: 0 0 20px rgb(184, 161, 34), 0 0 40px red;
  opacity: 0;
  will-change: transform, opacity;
  animation: fadeInText 4s ease-out forwards 2s,
             glowPulse 5s ease-in-out infinite alternate;
}

/* Make I container */
.mic-letter {
  position: relative;
  display: inline-block;
}

/* Emoji Mic */
.mic-emoji {
  position: absolute;
  top: -225px;  /* controls height above I */
  left: 50%;
  transform: translateX(-50%);
  font-size: 60px;
  animation: bounceMic 1.5s ease-in-out infinite;
  pointer-events: none;
}

/* Animations */
@keyframes slideImage {
  to {
    transform: translate3d(0, -50%, 0);
    opacity: 1;
  }
}

@keyframes fadeInText {
  to {
    opacity: 1;
  }
}

@keyframes slideDown {
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

@keyframes glowPulse {
  from {
    text-shadow: 0 0 20px gold, 0 0 40px red;
  }
  to {
    text-shadow: 0 0 35px gold, 0 0 60px red;
  }
}

/* Bouncing Animation */
@keyframes bounceMic {
  0%   { transform: translateX(-50%) translateY(0); }
  50%  { transform: translateX(-50%) translateY(-15px); }
  100% { transform: translateX(-50%) translateY(0); }
}
/* HERO MOBILE FIX REFINED */
@media screen and (max-width: 768px) {
  .hero {
    display: flex;
    flex-direction: column;   /* stack image then text */
    align-items: center;
    justify-content: flex-start;
    height: auto !important;  /* natural height */
    background: linear-gradient(to right, #2a0000, #400000, #1a0000);
    overflow: visible;
    padding-top: 60px;        /* ensures hero image below navbar */
  }
.hero-img {
  position: static !important; 
  width: 95%;
  max-width: 500px;
  height: auto;
  margin: 0 auto;

  transform: none !important;   /* keep layout exactly as is */
  opacity: 0;

  animation: fadeInMobile 5s ease forwards;

  object-fit: cover;
}
@keyframes fadeInMobile {
  to {
    opacity: 1;
  }
}

  .hero-text {
    position: static !important;
    top: auto !important;
    left: auto !important;
    transform: none !important;
    font-size: 7vw;           /* scales automatically */
    margin: 20px 0 30px 0;
    text-align: center;
    width: 90%;
    line-height: 1.2;         /* adds breathing room */
    color: rgb(160,141,30);
    text-shadow: 0 0 10px rgb(184,161,34), 0 0 20px red;
  }

  .mic-emoji {
    position: relative !important;
    top: -5px;                /* slightly above text for styling */
    font-size: 8vw;           /* scales nicely on mobile */
  }
}

</style>
</head>
<body>

<div class="navbar">
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="services.html">Services</a>
  <a href="bookings.html">Bookings</a>
</div>

<div class="hero">
  <img src="Angie1.jpg" class="hero-img" alt="DJ Angie">

  <div class="hero-text">
    DJ ANGi<span class="mic-letter">
      <span class="mic-emoji">🎤</span>
    </span>
  </div>

</div>

<footer style="text-align: center; padding: 20px; font-size: 14px; color: #fff; background: rgba(0,0,0,0.7); position: relative; bottom: 0; width: 100%;">
  © 2026 Angi Hammoud. All Rights Reserved.
</footer>

</body>
</html>
